services:
  pgvector:
    image: pgvector/pgvector:pg16
    container_name: nptel_pgvector
    environment:
      POSTGRES_DB: nptel_assistant
      POSTGRES_USER: rag_admin
      POSTGRES_PASSWORD: admin_rag
    ports:
      - "5433:5432"
    volumes:
      - pgvector_data:/var/lib/postgresql/data
      - ./backend/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rag_admin -d nptel_assistant"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nptel_app
    depends_on:
      pgvector:
        condition: service_healthy
    env_file:
      - .env
    environment:
      PG_DATABASE_URL: postgresql+psycopg2://rag_admin:admin_rag@pgvector:5432/nptel_assistant
    ports:
      - "8000:8000"
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  pgvector_data:
